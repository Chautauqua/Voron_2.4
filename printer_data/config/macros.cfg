[gcode_macro PRINT_START]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(190)|float %}

    SET_PIN PIN=caselight VALUE=0.3
    
    # Start bed heating
    M190 S{BED_TEMP}
    # Use absolute coordinates
    G90
    # Reset the G-Code Z offset (adjust Z offset if needed)
    SET_GCODE_OFFSET Z=0.0
    M109 S150
    G28
    # Home the printer
    NOZZLE_CLEAN
    QUAD_GANTRY_LEVEL 
    # BED_MESH_CALIBRATE ADAPTIVE=1
    BED_MESH_CALIBRATE 
    
    
    # Set and wait for nozzle and bed to reach temperature
    M190 S{BED_TEMP}
    NOZZLE_CLEAN
    M109 S{EXTRUDER_TEMP}

    G1 Z5 F3000
    G1 Z0.15 F300
    # PRINT_END retracts by 3mm to prevent ozing. extrude by 3mm to reset filament
    G92 E0.0
    G1 E3.0 F300
    SET_LED LED=toolhead_light RED=1.0 GREEN=0.0 BLUE=0.0 WHITE=0.5 TRANSMIT=1
    
    G1 Z2 F240
    G1 X2 Y10 F3000
    G1 Z0.28 F240
    G92 E0.0
    G1 Y190 E10.0 F1500.0 ; intro line
    G1 X2.3 F5000
    G1 Y10 E15 F1200.0 ; intro line
    G92 E0.0

    G90 ; use absolute coordinates

